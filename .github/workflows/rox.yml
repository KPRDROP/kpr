name: ROXIE Playlist Generator

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'rox.py'

jobs:
  generate-playlists:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4 html5lib lxml selectolax playwright httpx[http2] pytz
        playwright install chromium
    
    - name: Run ROXIE scraper
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python rox.py
    
    - name: List generated files
      run: |
        echo "Generated files:"
        ls -la rox_*.m3u8 2>/dev/null || echo "No playlist files found"
    
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add only the playlist files
        git add rox_vlc.m3u8 rox_tivimate.m3u8 || true
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update ROXIE playlists - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
