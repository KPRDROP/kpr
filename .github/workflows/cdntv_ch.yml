name: CDNTV_CH Updater

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright httpx[http2] pytz
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps
        
    - name: Verify secrets
      run: |
        if [ -z "${{ secrets.CDNTV_CH_API_URL }}" ]; then
          echo "CDNTV_CH_API_URL secret is not set"
          exit 1
        fi
        echo "CDNTV_CH_API_URL is set"
        
    - name: Run CDNTV_CH updater
      env:
        CDNTV_CH_API_URL: ${{ secrets.CDNTV_CH_API_URL }}
      run: |
        python -c "from cdntv_ch import run; run()"
        
    - name: Check for output files
      id: check_files
      run: |
        if [ -f cdntv_ch_vlc.m3u8 ] && [ -f cdntv_ch_tivimate.m3u8 ]; then
          echo "files_exist=true" >> $GITHUB_OUTPUT
          echo "Found output files"
          echo "VLC file size: $(wc -c < cdntv_ch_vlc.m3u8) bytes"
          echo "TiviMate file size: $(wc -c < cdntv_ch_tivimate.m3u8) bytes"
        else
          echo "files_exist=false" >> $GITHUB_OUTPUT
          echo "No output files found"
        fi
        
    - name: Commit and push changes
      if: steps.check_files.outputs.files_exist == 'true'
      run: |
        # Check if files have changes
        if [[ -n $(git status --porcelain cdntv_ch_vlc.m3u8 cdntv_ch_tivimate.m3u8) ]]; then
          echo "Changes detected, committing..."
          
          # Pull latest changes to avoid conflicts
          git pull --rebase origin main || true
          
          # Add only the playlist files
          git add cdntv_ch_vlc.m3u8 cdntv_ch_tivimate.m3u8
          
          # Commit changes
          git commit -m "Update CDNTV_CH Playlist - $(date '+%Y-%m-%d %H:%M:%S')"
          
          # Push changes
          git push origin main
          
          echo "Successfully pushed changes"
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
