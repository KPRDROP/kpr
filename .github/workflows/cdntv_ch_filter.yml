name: CDNTV_CH Filtered Updater

on:
  schedule:
    # Runs every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright httpx[http2] pytz
          playwright install --with-deps
          playwright install chromium

      - name: Run updater
        env:
          CDNTV_CH_API_URL: ${{ secrets.CDNTV_CH_API_URL }}
        run: |
          echo "Starting CDNTV_CH updater..."
          python cdntv_ch.py

      - name: Commit & Push safely
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add cdn_ch_filter_vlc.m3u8 cdn_ch_filter_tivimate.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update CDNTV_CH playlist"

          # FIX: stash before rebase
          if ! git push origin main; then
            echo "Push rejected — rebasing safely..."
            git stash
            git pull --rebase origin main
            git stash pop
            git add cdn_ch_filter_vlc.m3u8 cdn_ch_filter_tivimate.m3u8
            git commit -m "Update CDNTV_CH playlist (rebased)" || true
            git push origin main
          fi
