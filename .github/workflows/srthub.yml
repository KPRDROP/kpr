name: STRHUB Playlist Updater

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright selectolax httpx[http2] pytz
          playwright install chromium

      - name: Run scraper
        env:
          SRTHUB_BASE_URL: ${{ secrets.SRTHUB_BASE_URL }}
        run: python srthub.py

      - name: Commit playlists
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add srthub_vlc.m3u8 srthub_tivimate.m3u8
          git commit -m "Auto update STRHUB playlists" || echo "No changes"
          git push
