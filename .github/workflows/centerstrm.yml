name: CenterStrm Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright selectolax httpx[http2] pytz
          playwright install --with-deps
          playwright install chromium

      - name: Run updater
        env:
          CENTERSTRM_API: ${{ secrets.CENTERSTRM_API }}
        run: |
          echo "Starting StreamCenter scraper..."
          python centerstrm.py

      - name: Commit & Push safely
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add centerstrm.m3u

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update CenterStrm playlist"

          # First push attempt
          if git push origin HEAD:main; then
            exit 0
          fi

          echo "Remote updated. Rebasing..."

          git fetch origin main
          git rebase origin/main

          git push origin HEAD:main
