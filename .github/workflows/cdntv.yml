name: CDNTV Updater

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright httpx[http2] pytz
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps
        
    - name: Verify secrets
      run: |
        if [ -z "${{ secrets.CDNTV_API_URL }}" ]; then
          echo "CDNTV_API_URL secret is not set"
          exit 1
        fi
        echo "CDNTV_API_URL is set"
        
    - name: Run CDNTV scraper
      env:
        CDNTV_API_URL: ${{ secrets.CDNTV_API_URL }}
      run: |
        python -c "from cdntv import run; run()"
        
    - name: Check for output files
      id: check_files
      run: |
        if [ -f cdntv_vlc.m3u8 ] && [ -f cdntv_tivimate.m3u8 ]; then
          echo "files_exist=true" >> $GITHUB_OUTPUT
          echo "Found output files"
          echo "VLC file size: $(wc -c < cdntv_vlc.m3u8) bytes"
          echo "TiviMate file size: $(wc -c < cdntv_tivimate.m3u8) bytes"
        else
          echo "files_exist=false" >> $GITHUB_OUTPUT
          echo "No output files found"
        fi
        
    - name: Commit & push
      if: steps.check_files.outputs.files_exist == 'true'
      run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add cdntv_vlc.m3u8 cdntv_tivimate.m3u8

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update CDN Playlist"

          if ! git push origin main; then
            git stash
            git pull --rebase origin main
            git stash pop
            git add cdntv_vlc.m3u8 cdntv_tivimate.m3u8
            git commit -m "Update CDNTV Playlist (rebased)" || true
            git push origin main
          fi
